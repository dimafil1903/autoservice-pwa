<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Адмін — Автосервіс</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui; background: #1a1a2e; color: #eee; min-height: 100vh; }

    #login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 32px;
    }
    #login-screen h1 { font-size: 1.5rem; margin-bottom: 24px; }
    #login-screen input {
      width: 100%; max-width: 300px; padding: 12px; border-radius: 8px;
      border: 1px solid #2a3a5a; background: #16213e; color: #eee;
      font-size: 1rem; margin-bottom: 12px; outline: none;
    }
    #login-screen button {
      width: 100%; max-width: 300px; padding: 12px; background: #e94560;
      color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
    }
    #login-error { color: #f44336; margin-top: 8px; font-size: 0.85rem; }

    #admin-panel { display: none; padding: 24px; max-width: 1100px; margin: 0 auto; }
    #admin-panel header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    #admin-panel h1 { font-size: 1.3rem; }

    .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    .btn-primary { background: #e94560; color: white; }
    .btn-secondary { background: #16213e; color: #eee; border: 1px solid #2a3a5a; }

    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th { background: #0f2548; padding: 10px; text-align: left; color: #8899aa; font-weight: 600; }
    td { padding: 10px; border-bottom: 1px solid #2a3a5a; vertical-align: middle; }

    .status-badge { padding: 3px 10px; border-radius: 12px; font-size: 0.78rem; }
    .status-badge.active   { background: #1b3a1b; color: #4caf50; }
    .status-badge.blocked  { background: #3a1b1b; color: #f44336; }

    .btn-action { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
    .btn-action.danger  { background: #f44336; color: white; }
    .btn-action.success { background: #4caf50; color: white; }

    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: #16213e; border: 1px solid #2a3a5a; border-radius: 12px;
      padding: 24px; width: 100%; max-width: 400px;
    }
    .modal h2 { margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.82rem; color: #8899aa; margin-bottom: 5px; }
    .form-group input {
      width: 100%; padding: 10px; border-radius: 8px;
      border: 1px solid #2a3a5a; background: #0f2548; color: #eee;
      font-size: 0.9rem; outline: none;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  </style>
</head>
<body>

<div id="login-screen">
  <h1>🔐 Адмін-панель</h1>
  <input type="password" id="admin-password" placeholder="Пароль" onkeydown="if(event.key==='Enter')Admin.checkPassword()">
  <button onclick="Admin.checkPassword()">Увійти</button>
  <p id="login-error"></p>
</div>

<div id="admin-panel">
  <header>
    <h1>🔧 Автосервіс — Адмін</h1>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" onclick="Admin.generateInvite()">🔗 Згенерувати invite</button>
      <button class="btn btn-secondary" onclick="Admin.showAddForm()">+ Вручну</button>
    </div>
  </header>

  <!-- Invite result box -->
  <div id="invite-result" class="hidden" style="background:#16213e;border:1px solid #2a3a5a;border-radius:12px;padding:16px;margin-bottom:20px">
    <div style="font-weight:600;margin-bottom:8px">✅ Посилання для майстра:</div>
    <div id="invite-url" style="word-break:break-all;font-size:0.85rem;color:#64b5f6;margin-bottom:8px"></div>
    <div style="font-size:0.78rem;color:#8899aa;margin-bottom:12px">Токен: <span id="invite-token"></span></div>
    <button class="btn btn-secondary" style="font-size:0.85rem;padding:8px 16px" onclick="Admin.copyInvite()">📋 Скопіювати</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th><th>Ім'я</th><th>Телефон</th>
        <th>Script URL</th><th>Статус</th><th>Реєстрація</th><th>Дії</th>
      </tr>
    </thead>
    <tbody id="masters-tbody">
      <tr><td colspan="7" style="text-align:center;padding:20px">Завантаження...</td></tr>
    </tbody>
  </table>
</div>

<!-- Modal Add Master -->
<div class="modal-overlay" id="modal-add-master" style="display:none">
  <div class="modal">
    <h2>Новий майстер</h2>
    <div class="form-group"><label>Ім'я *</label><input id="master-name" placeholder="Іваненко Іван"></div>
    <div class="form-group"><label>Телефон</label><input id="master-phone" placeholder="+380..."></div>
    <div class="form-group"><label>Script URL</label><input id="master-script-url" placeholder="https://script.google.com/..."></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="Admin.saveMaster()">Зберегти</button>
      <button class="btn btn-secondary" onclick="Admin.hideAddForm()">Скасувати</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="admin/admin-db.js"></script>
<script src="admin/admin.js"></script>
</body>
</html>
