name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          cat > config.js << 'EOF'
          const CONFIG = {
            ADMIN_SCRIPT_URL: '${{ secrets.ADMIN_SCRIPT_URL }}',
            TEMPLATE_SHEET_ID: '${{ secrets.TEMPLATE_SHEET_ID }}',
            PWA_URL: 'https://dimafil1903.github.io/autoservice-pwa/',
            APP_VERSION: '1.0.0',
            ADMIN_PASSWORD: '${{ secrets.ADMIN_PASSWORD }}'
          };
          EOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
